name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUTF8: "1"

defaults:
  run:
    shell: pwsh

jobs:
  static:
    name: Static repository validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt; skipping dependency install."
          }

      - name: Compile Python scripts
        run: python -m compileall scripts

      - name: Validate plugin structure
        run: python scripts/ci_validate_repo.py --strict

      - name: Run workflow task parallelism tests
        run: python scripts/test_workflow_task_parallelism.py

      - name: Run tracked regression tests
        run: |
          python scripts/test_workflow_recovery_regressions.py
          python scripts/test_opencode_adapter_regressions.py
          python scripts/test_agent_handoff_checkpoint_regressions.py
          python scripts/test_path_safety_regressions.py
          python scripts/test_release_metadata_regressions.py

  windows-smoke:
    name: Windows repository smoke
    runs-on: windows-latest
    needs: static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt; skipping dependency install."
          }

      - name: Compile Python scripts
        run: python -m compileall scripts

      - name: Run repo-only workflow health check
        run: python scripts/test_workflow_health.py --repo-only --strict

      - name: Run workflow task parallelism tests
        run: python scripts/test_workflow_task_parallelism.py

      - name: Run tracked regression tests
        run: |
          python scripts/test_workflow_recovery_regressions.py
          python scripts/test_opencode_adapter_regressions.py
          python scripts/test_agent_handoff_checkpoint_regressions.py
          python scripts/test_path_safety_regressions.py
          python scripts/test_release_metadata_regressions.py

      - name: Run game profile and Fallout 4 routing regressions
        run: python -m pytest -q scripts/test_game_profile_regressions.py scripts/test_fallout4_routing_regressions.py

  windows-fallout4-adapters:
    name: Windows Fallout 4 adapters
    runs-on: windows-latest
    needs: static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Python dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt; skipping dependency install."
          }

      - name: Run plugin binary invariant tests
        run: dotnet test adapters/SkyrimPluginTextTool.Tests/SkyrimPluginTextTool.Tests.csproj -c Release --nologo

      - name: Run Fallout 4 plugin and PEX adapter regressions
        run: python -m pytest -q scripts/test_fallout4_plugin_adapter_regressions.py scripts/test_fallout4_pex_adapter_regressions.py

      - name: Run BA2 controlled extraction regressions
        run: python -m pytest -q scripts/test_ba2_extractor_regressions.py

  windows-fallout4-workflow:
    name: Windows Fallout 4 workflow
    runs-on: windows-latest
    needs: static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Python dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt; skipping dependency install."
          }

      - name: Run Fallout 4 workflow integration regressions
        run: python -m pytest -q scripts/test_fallout4_workflow_integration.py

  effect-regression:
    name: Effect regression fixtures
    runs-on: windows-latest
    needs: static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt; skipping dependency install."
          }

      - name: Run effect regression fixtures
        run: python scripts/run_effect_regression.py --all --ci
