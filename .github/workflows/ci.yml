name: CI

on:
  push:
    branches:
      - master
      - main
      - "codex/**"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUTF8: "1"

defaults:
  run:
    shell: pwsh

jobs:
  static:
    name: Static repository validation (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt; skipping dependency install."
          }
          python -m pip install "pytest>=8.0"

      - name: Compile Python scripts
        run: python -m compileall scripts

      - name: Validate plugin structure
        run: python scripts/ci_validate_repo.py --strict

      - name: Run package-level regression tests
        run: >-
          python -m pytest -q tests
          --ignore=tests/test_smt_cli.py
          --ignore=tests/test_smt_cli_workspace.py

      - name: Run portable SMT platform contract regressions
        run: >-
          python -m pytest -q tests/test_smt_cli_workspace.py
          -k "explicit_workspace_does_not_resolve_default_documents_root or
          guid_layout_uses_fixed_width_win32_fields"

      - name: Run complete branch-added regression modules
        run: python -m pytest -q scripts/test_bethesda_advanced_fixture_builders.py scripts/test_game_profile_prompts.py scripts/test_non_gui_strict_coverage.py scripts/test_non_gui_workflow_coverage.py scripts/test_plugin_translation_schema.py scripts/test_resource_model.py scripts/test_strict_qa_reuse.py scripts/test_workflow_health_issue_dedup.py scripts/test_workflow_issue_identity.py

      - name: Run per-Skill trigger and runtime effect tests
        run: python -m pytest -q scripts/test_skill_effects.py

      - name: Run capability architecture tests
        run: python -m pytest -q scripts/test_capability_resolver.py scripts/test_capability_wiring_contracts.py scripts/test_adapter_registry.py scripts/test_archive_capabilities.py scripts/test_bsa_loose_override.py scripts/test_plugin_master_style_manifest.py scripts/test_plugin_capability_adapter.py scripts/test_used_capabilities.py

      - name: Run Mod scale, materialization, delivery, and aggregation tests
        run: python -m pytest -q scripts/test_mod_scale_assessment.py scripts/test_mod_scale_execution.py scripts/test_mod_scale_benchmark.py scripts/test_translation_candidate_shards.py scripts/test_translation_overlay_delivery.py scripts/test_aggregate_translation_projects.py scripts/test_prepare_mod_workspace.py

      - name: Run translation extraction and semantic review tests
        run: python -m pytest -q scripts/test_non_gui_candidate_extraction.py scripts/test_non_gui_candidate_classification.py scripts/test_translation_context.py scripts/test_final_review_quality_regressions.py scripts/test_short_word_quality.py scripts/test_external_glossary_matches.py

      - name: Run workflow task parallelism tests
        run: python scripts/test_workflow_task_parallelism.py

      - name: Validate production workflow contracts
        run: |
          python -c "import sys; sys.path.insert(0, 'scripts'); import strict_qa_reuse, translation_context, workflow_issues"
          python scripts/test_workflow_health.py --repo-only --strict

      - name: Run tracked regression tests
        run: |
          python scripts/test_workflow_recovery_regressions.py
          python scripts/test_opencode_adapter_regressions.py
          python scripts/test_agent_handoff_checkpoint_regressions.py
          python scripts/test_path_safety_regressions.py
          python scripts/test_release_metadata_regressions.py

  windows-smoke:
    name: Windows repository smoke
    runs-on: windows-latest
    needs: static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt; skipping dependency install."
          }
          python -m pip install "pytest>=8.0"

      - name: Compile Python scripts
        run: python -m compileall scripts

      - name: Run repo-only workflow health check
        run: python scripts/test_workflow_health.py --repo-only --strict

      - name: Run workflow task parallelism tests
        run: python scripts/test_workflow_task_parallelism.py

      - name: Run tracked regression tests
        run: |
          python scripts/test_workflow_recovery_regressions.py
          python scripts/test_opencode_adapter_regressions.py
          python scripts/test_agent_handoff_checkpoint_regressions.py
          python scripts/test_path_safety_regressions.py
          python scripts/test_release_metadata_regressions.py

      - name: Run game profile, glossary format, and Fallout 4 routing regressions
        run: python -m pytest -q scripts/test_game_profile_regressions.py scripts/test_glossary_binary_formats.py scripts/test_fallout4_routing_regressions.py

      - name: Run workflow semantics and documentation contracts
        run: python -m pytest -q scripts/test_task6b1_findings_regressions.py scripts/test_task6b1_semantics.py tests/test_task6b2_documentation.py

      - name: Run Windows SMT public CLI regressions
        run: python -m pytest -q tests/test_smt_cli.py tests/test_smt_cli_workspace.py

  windows-fallout4-adapters:
    name: Windows Fallout 4 adapters
    runs-on: windows-latest
    needs: static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Python dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt; skipping dependency install."
          }
          python -m pip install "pytest>=8.0"

      - name: Run plugin light FormKey and parsed invariant tests
        run: dotnet test adapters/SkyrimPluginTextTool.Tests/SkyrimPluginTextTool.Tests.csproj -c Release --nologo

      - name: Run STRINGS family adapter tests
        run: dotnet test adapters/BethesdaStringTableTool.Tests/BethesdaStringTableTool.Tests.csproj -c Release --nologo

      - name: Run Fallout 4 plugin and PEX adapter regressions
        run: python -m pytest -q scripts/test_plugin_master_style_manifest.py scripts/test_plugin_capability_adapter.py scripts/test_fallout4_plugin_adapter_regressions.py scripts/test_fallout4_pex_adapter_regressions.py

      - name: Run Fallout 4 PEX semantic writeback regressions
        run: python -m pytest -q scripts/test_fallout4_pex_semantic_writeback.py scripts/test_final_binary_review_pex_authorization.py scripts/test_pex_workflow_adapter_result.py

      - name: Run Bethesda string table adapter regressions
        run: python -m pytest -q scripts/test_bethesda_string_table_adapter.py

      - name: Run localized delivery and wiring regressions
        run: python -m pytest -q scripts/test_localized_delivery.py scripts/test_capability_wiring_contracts.py

      - name: Run BSA capability evidence regressions
        run: python -m pytest -q scripts/test_bsa_loose_override.py scripts/test_archive_capabilities.py scripts/test_used_capabilities.py

      - name: Run BA2 controlled extraction regressions
        run: python -m pytest -q scripts/test_ba2_extractor_regressions.py scripts/test_bethesda_archive_adapter.py

  windows-fallout4-workflow:
    name: Windows Fallout 4 workflow
    runs-on: windows-latest
    needs: static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Python dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt; skipping dependency install."
          }
          python -m pip install "pytest>=8.0"

      - name: Install pinned project-local .NET SDK
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/vendor/dotnet-install.ps1 -Version "8.0.422" -InstallDir tools/dotnet-sdk -NoPath
          $installed = & .\tools\dotnet-sdk\dotnet.exe --version
          if ($installed.Trim() -ne "8.0.422") {
            throw "Expected project-local .NET SDK 8.0.422, found $installed"
          }

      - name: Run Fallout 4 workflow integration regressions
        run: python -m pytest -q scripts/test_fallout4_workflow_integration.py

  effect-regression:
    name: Effect regression fixtures
    runs-on: windows-latest
    needs: static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt; skipping dependency install."
          }

      - name: Run effect regression fixtures
        run: python scripts/run_effect_regression.py --all --ci
